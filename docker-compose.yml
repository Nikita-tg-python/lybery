services:
  db:
    image: postgres:15-alpine 
    container_name: lybary_db
    restart: always
    environment:
      POSTGRES_USER: nikita         # Замени на свой логин
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Замени на свой пароль
      POSTGRES_DB: lybary_db        # Название твоей базы данных
    ports:
      - "5432:5432" # Стандартный порт PostgreSQL
    volumes:
      - pgdata:/var/lib/postgresql/data # Правильный путь для сохранения данных Postgres

  lybary:
    build: .
    image: necrofus/lybary
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  pgdata: # Переименовали esdata1 во что-то более понятное
    driver: local